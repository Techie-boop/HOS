version: '3.8'

services:
  # Next.js Application Replica 1
  app1:
    build:
      context: ./
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "3000"
    restart: always

  # Next.js Application Replica 2
  app2:
    build:
      context: ./
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "3000"
    restart: always

  # Nginx Load Balancer / Reverse Proxy
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app1
      - app2
    restart: always
